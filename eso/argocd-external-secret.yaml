apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-admin-password
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Admin password - must be bcrypt hash
        admin.password: "{{ .password }}"
        # Timestamp of last password change - required by ArgoCD
        admin.passwordMtime: "2024-01-01T00:00:00Z"
        # JWT signing key - ArgoCD panics without this when createSecret: false
        # Generate a random string: openssl rand -base64 32
        server.secretkey: "hello-world-argocd-server-secret-key"
  data:
    - secretKey: password
      remoteRef:
        key: hello-world/dev/argocd-admin-password
        property: password