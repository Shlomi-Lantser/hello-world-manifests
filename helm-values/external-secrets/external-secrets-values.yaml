# External Secrets Operator - Helm Values
# Install with:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm repo update
#   helm install external-secrets external-secrets/external-secrets \
#     -n external-secrets \
#     --create-namespace \
#     -f helm/external-secrets-values.yaml

# -- Install CRDs automatically
installCRDs: true

# -- ServiceAccount used by ESO pods
# Pod Identity links this SA to the IAM role automatically
serviceAccount:
  create: true
  name: external-secrets

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
